services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: regnskapsbruker
      POSTGRES_PASSWORD: regnskapsbruker
      POSTGRES_DB: regnskapsbruker
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
